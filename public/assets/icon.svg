<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Push or Pay">
  <defs>
    <!-- App-icon background: premium violet squircle -->
    <linearGradient id="bg" x1="80" y1="40" x2="440" y2="480" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#9a8cff"/>
      <stop offset="0.42" stop-color="#6f5cff"/>
      <stop offset="1" stop-color="#231a4d"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.34" r="0.62">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <!-- Flame gradient: warm fire-orange -->
    <linearGradient id="flame" x1="256" y1="120" x2="256" y2="384" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffd27a"/>
      <stop offset="0.34" stop-color="#ff8a3d"/>
      <stop offset="1" stop-color="#ff5e5e"/>
    </linearGradient>
    <linearGradient id="core" x1="256" y1="196" x2="256" y2="356" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fff7e6"/>
      <stop offset="1" stop-color="#ffb15a"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- Squircle base -->
  <rect x="16" y="16" width="480" height="480" rx="112" fill="url(#bg)"/>
  <rect x="16" y="16" width="480" height="480" rx="112" fill="url(#glow)"/>
  <!-- Top hairline highlight for depth -->
  <rect x="16" y="16" width="480" height="480" rx="112" fill="none" stroke="#ffffff" stroke-opacity="0.10" stroke-width="2"/>

  <!-- Soft flame glow behind -->
  <path filter="url(#soft)" opacity="0.55" fill="#ff6a4d" d="M256 118c40 52 78 78 78 140 0 62-45 100-78 100s-78-38-78-100c0-40 20-64 44-96 6 22 20 30 34 22-8-24-6-46 0-66z"/>

  <!-- Main flame -->
  <path fill="url(#flame)" d="M256 120c42 56 82 82 82 146 0 64-47 104-82 104s-82-40-82-104c0-42 21-67 46-100 5 24 21 33 36 24-9-26-6-48 0-70z"/>
  <!-- Inner core flame -->
  <path fill="url(#core)" d="M256 214c22 30 42 44 42 78 0 34-24 56-42 56s-42-22-42-56c0-22 11-36 24-53 3 13 11 18 20 13-5-14-4-25-2-38z"/>

  <!-- Dumbbell fused at flame base (strength motif) -->
  <g fill="#ffffff">
    <rect x="170" y="356" width="172" height="18" rx="9"/>
    <rect x="150" y="342" width="24" height="46" rx="9"/>
    <rect x="338" y="342" width="24" height="46" rx="9"/>
    <rect x="136" y="350" width="16" height="30" rx="7" fill-opacity="0.9"/>
    <rect x="360" y="350" width="16" height="30" rx="7" fill-opacity="0.9"/>
  </g>
</svg>
